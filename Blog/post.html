<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    (() => {
      const theme = localStorage.getItem('site-theme') === 'night' ? 'night' : 'day';
      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme === 'night' ? 'dark' : 'light';
    })();
  </script>
  <title>文章详情 | 如珩的博客</title>
  <meta name="description" content="如珩的博客文章详情页：左侧目录，右侧正文。">
  <link rel="icon" href="/favicon.ico?v=20260318" sizes="any">
  <link rel="icon" type="image/png" href="/favicon-profile-v2.png?v=20260318">
  <link rel="shortcut icon" href="/favicon-profile-v2.ico?v=20260318">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=20260318">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.38/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.38/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.38/dist/contrib/auto-render.min.js"></script>
  <script type="module" src="/src/scripts/blog-post.js"></script>
</head>
<body class="post-page-body">
  <div class="post-story-bg" aria-hidden="true">
    <div class="post-story-bg-layer"></div>
    <div class="post-story-bg-overlay"></div>
    <div class="post-story-bg-glow"></div>
    <div class="post-story-bg-ink"></div>
  </div>
  <main class="page-shell post-page" id="postRoot">
    <article class="article-hero article-hero--full" id="postTopAnchor">
      <h1 class="article-title" id="postTitle">文章加载中…</h1>
      <div class="post-hero-meta" id="postHeroMeta"></div>
      <div class="post-category-row" id="postCategories"></div>
    </article>

    <section class="post-layout">
      <aside class="post-sidebar">
        <div class="post-sidebar-sticky">
          <section class="sidebar-card toc-card">
            <div class="toc-card-head">
              <h2 class="sidebar-title">目录</h2>
              <button class="icon-button theme-button toc-theme-toggle" type="button" data-theme-toggle></button>
            </div>
            <p class="panel-copy" id="tocEmpty" hidden>这篇文章没有生成目录项。</p>
            <nav class="toc-list" id="tocList" aria-label="文章目录"></nav>
          </section>
        </div>
      </aside>

      <section class="post-main">
        <article class="article-shell">
          <div class="article-status" id="articleStatus">正在读取文章内容…</div>
          <div id="articleContent" class="article-content"></div>
        </article>
      </section>
    </section>
  </main>

  <div class="lightbox" id="imageLightbox" aria-hidden="true">
    <div class="lightbox-inner">
      <button id="lightboxClose" type="button" aria-label="关闭图片预览">×</button>
      <img id="lightboxImage" alt="放大预览图">
      <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>
  </div>

</body>
</html>
