<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章 - 如珩的博客</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/css.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/html.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/cpp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/c.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/csharp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/go.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/rust.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/typescript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/php.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/ruby.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/swift.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/kotlin.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/sql.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/xml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/markdown.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/diff.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/powershell.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/perl.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/lua.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/r.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/scala.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/shell.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/ini.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/toml.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box !important;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header .meta {
            font-size: 0.95rem;
            opacity: 0.9;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .header .post-categories {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .header .category-tag {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .main-wrapper {
            display: flex;
            margin: 0 auto;
            padding: 40px 60px;
            gap: 40px;
        }

        .toc-wrapper {
            width: 390px;
            flex-shrink: 0;
        }

        .toc-container {
            position: sticky;
            top: 40px;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            max-height: calc(100vh - 80px);
            overflow-y: auto;
        }

        .toc-title {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .toc-list {
            list-style: none;
        }

        .toc-list ul {
            list-style: none;
        }

        .toc-item {
            margin-bottom: 4px;
        }

        .toc-item-header {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 6px;
            transition: all 0.2s;
            cursor: pointer;
            border-left: 3px solid transparent;
        }

        .toc-item-header:hover {
            background: #f0f0f0;
        }

        .toc-item-header:hover .toc-link {
            color: #667eea;
        }

        .toc-item-header:hover .toc-toggle {
            color: #667eea;
        }

        .toc-item-header.active {
            background: #f0f0f0;
            border-left-color: #667eea;
        }

        .toc-item-header.active .toc-link {
            color: #667eea;
            font-weight: 500;
        }

        .toc-toggle {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #999;
            transition: transform 0.2s, color 0.2s;
            flex-shrink: 0;
            user-select: none;
        }

        .toc-toggle.expanded {
            transform: rotate(90deg);
        }

        .toc-link {
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
            max-width: 85%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .toc-h1 .toc-link {
            font-weight: 600;
            color: #333;
            padding-left: 0;
        }

        .toc-h2 .toc-link {
            padding-left: 16px;
            font-size: 0.88rem;
        }

        .toc-h3 .toc-link {
            padding-left: 32px;
            font-size: 0.82rem;
            color: #888;
        }

        .toc-children {
            display: none;
            padding-left: 0;
        }

        .toc-children.expanded {
            display: block;
        }

        .article-wrapper {
            flex: 1;
            min-width: 0;
        }

        .nav-back {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .nav-back:hover {
            text-decoration: underline;
        }

        .article-content {
            background: white;
            border-radius: 12px;
            padding: 50px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            line-height: 1.8;
            color: #333;
            overflow: hidden;
        }

        .article-content h1,
        .article-content h2,
        .article-content h3 {
            margin: 30px 0 15px 0;
            color: #222;
            scroll-margin-top: 20px;
        }

        .article-content h1 {
            font-size: 1.8rem;
        }

        .article-content h2 {
            font-size: 1.5rem;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 8px;
        }

        .article-content h3 {
            font-size: 1.2rem;
        }

        .article-content p {
            margin: 15px 0;
        }

        .article-content figure {
            margin: 20px 0 !important;
            padding: 0 !important;
            border: none !important;
            background: transparent !important;
        }

        .article-content figure figcaption {
            display: none !important;
        }

        .code-block-wrapper {
            position: relative;
            margin: 20px 0 !important;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #f6f8fa;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 14px;
            cursor: pointer;
            color: #24292f;
            transition: all 0.2s;
            z-index: 10;
            line-height: 1;
        }

        .copy-btn:hover {
            background: #eaeef2;
        }

        .copy-btn.copied {
            background: #22c55e;
            color: white;
            border-color: #22c55e;
        }

        .article-content pre,
        .article-content figure pre {
            background: #f6f8fa !important;
            color: #24292f !important;
            padding: 20px !important;
            padding-top: 40px !important;
            overflow-x: auto !important;
            overflow-y: visible !important;
            margin: 0 !important;
            width: 100% !important;
            max-width: 100% !important;
            box-sizing: border-box !important;
            border: 1px solid #d0d7de !important;
            border-radius: 6px !important;
            box-shadow: none !important;
        }

        .article-content pre code,
        .article-content figure pre code {
            display: block !important;
            white-space: pre !important;
            font-family: 'SF Mono', 'Monaco', 'Consolas', 'Courier New', monospace !important;
            font-size: 0.9rem !important;
            line-height: 1.6 !important;
            overflow-wrap: normal !important;
            word-wrap: normal !important;
            width: fit-content !important;
            min-width: 100% !important;
            background: transparent !important;
            padding: 0 !important;
            border: none !important;
            color: inherit !important;
        }

        .article-content code {
            font-family: 'SF Mono', 'Monaco', 'Consolas', 'Courier New', monospace;
            font-size: 0.9rem;
            background: #f6f8fa;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .article-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 20px 0;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .article-content img:hover {
            transform: scale(1.02);
        }

        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
        }

        .image-modal.active {
            display: flex;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
        }

        .image-modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: 300;
            cursor: pointer;
            line-height: 1;
        }

        .article-content a {
            color: #667eea;
            text-decoration: none;
        }

        .article-content a:hover {
            text-decoration: underline;
        }

        .article-content blockquote {
            border-left: 4px solid #667eea;
            padding-left: 20px;
            margin: 20px 0;
            color: #666;
            background: #f9f9f9;
            padding: 15px 20px;
            border-radius: 0 8px 8px 0;
        }

        .article-content ul,
        .article-content ol {
            margin: 15px 0;
            padding-left: 30px;
        }

        .article-content li {
            margin: 8px 0;
        }

        .article-content hr {
            border: none;
            border-top: 1px solid #eee;
            margin: 30px 0;
        }

        .article-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        .article-content th,
        .article-content td {
            border: 1px solid #ddd;
            padding: 10px 15px;
            text-align: left;
        }

        .article-content th {
            background: #f6f8fa;
            font-weight: 600;
        }

        @media (max-width: 1024px) {
            .toc-wrapper {
                display: none;
            }

            .main-wrapper {
                padding: 40px 20px;
            }
        }

        @media (max-width: 600px) {
            .article-content {
                padding: 25px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .main-wrapper {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 id="articleTitle">加载中...</h1>
        <div class="meta" id="articleMeta"></div>
    </div>

    <div class="main-wrapper">
        <aside class="toc-wrapper">
            <nav class="toc-container">
                <div class="toc-title">目录</div>
                <ul class="toc-list" id="tocList"></ul>
            </nav>
        </aside>

        <main class="article-wrapper">
            <a href="/Blog/" class="nav-back">← 返回博客</a>
            <article class="article-content" id="articleContent">
                <p>正在加载文章内容...</p>
            </article>
        </main>
    </div>

    <div class="image-modal" id="imageModal" onclick="closeImageModal()">
        <span class="image-modal-close" onclick="closeImageModal()">&times;</span>
        <img id="modalImage" src="" alt="">
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');
        let tocTree = [];

        fetch('/Blog/config.json')
            .then(response => response.json())
            .then(config => {
                const post = config.posts.find(p => p.id === postId);
                if (post) {
                    document.getElementById('articleTitle').textContent = post.title;
                    
                    let metaHtml = '';
                    if (post.categories && post.categories.length > 0) {
                        metaHtml += `
                            <div class="post-categories">
                                ${post.categories.map(cat => `<span class="category-tag">${cat}</span>`).join('')}
                            </div>
                        `;
                    }
                    metaHtml += `<span>${post.date}</span>`;
                    document.getElementById('articleMeta').innerHTML = metaHtml;

                    loadArticleContent(post.path, post.id);
                } else {
                    document.getElementById('articleTitle').textContent = '文章未找到';
                    document.getElementById('articleContent').innerHTML = '<p>抱歉，找不到该文章。</p>';
                }
            });

        function loadArticleContent(path, id) {
            const pathParts = path.split('/').filter(p => p);
            const fileName = pathParts[pathParts.length - 1];
            const mdPath = `${path}${fileName}.md`;
            
            fetch(mdPath)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Markdown file not found');
                    }
                    return response.text();
                })
                .then(md => {
                    let html = marked.parse(md);
                    
                    html = html.replace(/src="assets\//g, `src="${path}assets/`);
                    
                    document.getElementById('articleContent').innerHTML = html;
                    
                    processCodeBlocks();
                    processImages();
                    generateTOC();
                    setupTOCHighlight();
                })
                .catch(error => {
                    console.error('Error loading markdown:', error);
                    loadFallbackHTMLContent(path);
                });
        }

        function loadFallbackHTMLContent(path) {
            fetch(path + 'index.html')
                .then(response => response.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    
                    let mainContent = doc.querySelector('.post-content');
                    if (!mainContent) {
                        mainContent = doc.getElementById('post');
                    }
                    if (!mainContent) {
                        const bodyWrap = doc.getElementById('body-wrap');
                        if (bodyWrap) {
                            mainContent = bodyWrap;
                        }
                    }
                    if (!mainContent) {
                        mainContent = doc.body;
                    }
                    
                    let content = mainContent.innerHTML;
                    
                    content = content.replace(/src="\//g, 'src="/Blog/');
                    content = content.replace(/href="\//g, 'href="/Blog/');
                    
                    document.getElementById('articleContent').innerHTML = content;
                    
                    processCodeBlocks();
                    processImages();
                    generateTOC();
                    setupTOCHighlight();
                })
                .catch(error => {
                    document.getElementById('articleContent').innerHTML = 
                        '<p>文章内容加载失败，请稍后重试。</p>';
                    console.error('Error loading article:', error);
                });
        }

        function processCodeBlocks() {
            const articleContent = document.getElementById('articleContent');
            const pres = articleContent.querySelectorAll('pre');
            
            pres.forEach(pre => {
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                
                const code = pre.querySelector('code');
                let language = '';
                
                if (code && code.className) {
                    const match = code.className.match(/language-(\w+)/);
                    if (match) {
                        language = match[1];
                    }
                }
                
                if (!wrapper.parentNode) {
                    pre.parentNode.insertBefore(wrapper, pre);
                }
                wrapper.appendChild(pre);
                
                if (language && window.hljs) {
                    if (window.hljs.getLanguage(language)) {
                        code.classList.add(`language-${language}`);
                        window.hljs.highlightElement(code);
                    }
                }
                
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.innerHTML = '📋';
                copyBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    copyCode(code, copyBtn);
                });
                wrapper.appendChild(copyBtn);
            });
        }

        function copyCode(codeElement, button) {
            const text = codeElement.textContent;
            navigator.clipboard.writeText(text).then(() => {
                button.innerHTML = '✅';
                button.classList.add('copied');
                setTimeout(() => {
                    button.innerHTML = '📋';
                    button.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('复制失败:', err);
                button.innerHTML = '❌';
                setTimeout(() => {
                    button.innerHTML = '📋';
                }, 2000);
            });
        }

        function processImages() {
            const articleContent = document.getElementById('articleContent');
            const images = articleContent.querySelectorAll('img');
            
            images.forEach(img => {
                img.addEventListener('click', () => openImageModal(img.src));
            });
        }

        function openImageModal(src) {
            const modal = document.getElementById('imageModal');
            const modalImage = document.getElementById('modalImage');
            modalImage.src = src;
            modal.classList.add('active');
        }

        function closeImageModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.remove('active');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeImageModal();
            }
        });

        function generateTOC() {
            const content = document.getElementById('articleContent');
            const headings = content.querySelectorAll('h1, h2, h3');
            const tocList = document.getElementById('tocList');
            
            tocList.innerHTML = '';
            tocTree = [];
            
            let currentParent = { children: tocTree };
            let currentLevel = 0;
            const stack = [{ children: tocTree, level: 0 }];

            headings.forEach((heading, index) => {
                const id = `heading-${index}`;
                heading.id = id;
                const level = parseInt(heading.tagName.substring(1));
                
                const item = {
                    id: id,
                    text: heading.textContent,
                    level: level,
                    children: []
                };
                
                while (stack.length > 1 && stack[stack.length - 1].level >= level) {
                    stack.pop();
                }
                
                stack[stack.length - 1].children.push(item);
                stack.push({ ...item, children: item.children, level: level });
            });
            
            renderTOCTree(tocTree, tocList);
        }

        function renderTOCTree(tree, parentElement) {
            tree.forEach(item => {
                const li = document.createElement('li');
                li.className = `toc-item toc-h${item.level}`;
                li.dataset.id = item.id;
                
                const header = document.createElement('div');
                header.className = 'toc-item-header';
                header.dataset.id = item.id;
                
                if (item.children.length > 0) {
                    const toggle = document.createElement('span');
                    toggle.className = 'toc-toggle';
                    toggle.textContent = '▶';
                    toggle.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const children = li.querySelector('.toc-children');
                        if (children) {
                            children.classList.toggle('expanded');
                            toggle.classList.toggle('expanded');
                        }
                    });
                    header.appendChild(toggle);
                }
                
                const a = document.createElement('span');
                a.textContent = item.text;
                a.className = 'toc-link';
                header.appendChild(a);
                
                header.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.getElementById(item.id).scrollIntoView({ behavior: 'smooth' });
                });
                
                li.appendChild(header);
                
                if (item.children.length > 0) {
                    const ul = document.createElement('ul');
                    ul.className = 'toc-children';
                    renderTOCTree(item.children, ul);
                    li.appendChild(ul);
                }
                
                parentElement.appendChild(li);
            });
        }

        function expandPathToItem(targetId) {
            const tocList = document.getElementById('tocList');
            const allItems = tocList.querySelectorAll('.toc-item');
            
            allItems.forEach(item => {
                const children = item.querySelector('.toc-children');
                const toggle = item.querySelector('.toc-toggle');
                if (children && toggle) {
                    children.classList.remove('expanded');
                    toggle.classList.remove('expanded');
                }
            });
            
            let targetItem = tocList.querySelector(`.toc-item[data-id="${targetId}"]`);
            if (!targetItem) return;
            
            let pathItems = [];
            let current = targetItem;
            while (current && current !== tocList) {
                if (current.classList && current.classList.contains('toc-item')) {
                    pathItems.unshift(current);
                }
                current = current.parentElement;
            }
            
            pathItems.forEach(item => {
                const children = item.querySelector('.toc-children');
                const toggle = item.querySelector('.toc-toggle');
                if (children && toggle) {
                    children.classList.add('expanded');
                    toggle.classList.add('expanded');
                }
            });
        }

        function scrollTOCToItem(targetId) {
            const tocContainer = document.querySelector('.toc-container');
            const targetHeader = document.querySelector(`.toc-item-header[data-id="${targetId}"]`);
            
            if (targetHeader && tocContainer) {
                const containerRect = tocContainer.getBoundingClientRect();
                const headerRect = targetHeader.getBoundingClientRect();
                
                const headerTop = headerRect.top - containerRect.top + tocContainer.scrollTop;
                const headerBottom = headerTop + headerRect.height;
                const containerHeight = tocContainer.clientHeight;
                
                if (headerTop < tocContainer.scrollTop) {
                    tocContainer.scrollTop = headerTop - 20;
                } else if (headerBottom > tocContainer.scrollTop + containerHeight) {
                    tocContainer.scrollTop = headerBottom - containerHeight + 20;
                }
            }
        }

        function setupTOCHighlight() {
            const headings = document.querySelectorAll('#articleContent h1, #articleContent h2, #articleContent h3');
            
            window.addEventListener('scroll', () => {
                let currentHeading = null;
                
                headings.forEach(heading => {
                    const rect = heading.getBoundingClientRect();
                    if (rect.top <= 150) {
                        currentHeading = heading;
                    }
                });

                if (currentHeading) {
                    const id = currentHeading.id;
                    
                    document.querySelectorAll('.toc-item-header').forEach(h => h.classList.remove('active'));
                    const tocHeader = document.querySelector(`.toc-item-header[data-id="${id}"]`);
                    if (tocHeader) {
                        tocHeader.classList.add('active');
                    }
                    
                    expandPathToItem(id);
                    scrollTOCToItem(id);
                }
            }, { passive: true });
        }
    </script>
</body>
</html>
