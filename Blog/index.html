<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    (() => {
      const theme = localStorage.getItem('site-theme') === 'night' ? 'night' : 'day';
      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme === 'night' ? 'dark' : 'light';
    })();
  </script>
  <title>如珩的博客</title>
  <meta name="description" content="如珩的博客：首页采用上方分类、左侧杂项、右侧文章列表的布局。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" src="/src/scripts/blog-index.js"></script>
</head>
<body>
  <a class="skip-link" href="#blogContent">跳到文章列表</a>

  <main class="page-shell blog-page" id="blogRoot">
    <section class="surface-card blog-overview blog-overview--wide" data-reveal>
      <div class="blog-overview-head">
        <div>
          <h1 class="section-heading" id="blogTitle">如珩的博客</h1>
        </div>
        <div class="inline-actions blog-overview-actions">
          <button class="icon-button theme-button" type="button" data-theme-toggle></button>
        </div>
      </div>
      <div class="blog-overview-archive" role="region" aria-label="Categories">
        <div class="blog-overview-archive-head">
          <h2 class="panel-title visually-hidden">Categories</h2>
        </div>
        <nav class="archive-tree" id="archiveTree" aria-label="博客分类目录"></nav>
      </div>
    </section>

    <section class="blog-layout">
      <aside class="blog-sidebar">
        <div class="blog-sidebar-sticky">
          <section class="sidebar-card profile-card" data-reveal aria-label="个人简介">
            <h3 class="sidebar-title visually-hidden">个人简介</h3>
            <div class="profile-avatar" aria-hidden="true"></div>
            <p class="profile-copy" id="profileCopy"></p>
            <div class="profile-links" id="sidebarLinks"></div>
          </section>

          <section class="sidebar-card tag-cloud-card" data-reveal>
            <div class="tag-heatmap" id="tagHeatmap"></div>
          </section>
        </div>
      </aside>

      <section class="blog-content" id="blogContent">
        <section class="surface-card posts-panel" id="postsPanel" data-reveal aria-label="文章列表">
          <h2 class="panel-title visually-hidden" id="postSectionTitle">文章列表</h2>
          <p class="panel-copy visually-hidden" id="postSectionDesc"></p>
          <div class="posts-toolbar" id="postsToolbar">
            <button class="small-link posts-clear-filter" id="clearTagFilter" type="button" hidden>取消筛选</button>
          </div>
          <div class="posts-grid" id="postsGrid"></div>
        </section>
      </section>
    </section>
  </main>

  <footer class="footer">在同一页内切换分类，继续浏览本站内容。</footer>
</body>
</html>
