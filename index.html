<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    (() => {
      const theme = localStorage.getItem('site-theme') === 'night' ? 'night' : 'day';
      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme === 'night' ? 'dark' : 'light';
    })();
  </script>
  <title>如珩的个人网站</title>
  <meta name="description" content="如珩的个人网站：首页作为导航入口，通往博客、GitHub 与 Bilibili。">
  <link rel="icon" href="/favicon.ico?v=20260318" sizes="any">
  <link rel="icon" type="image/png" href="/favicon-profile-v2.png?v=20260318">
  <link rel="shortcut icon" href="/favicon-profile-v2.ico?v=20260318">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=20260318">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" src="/src/scripts/home.js"></script>
</head>
<body class="home-page">
  <div class="home-bg" aria-hidden="true">
    <div class="home-bg-layer" data-bg-layer="0" data-depth="0.6"></div>
    <div class="home-scene home-scene--camp"></div>
    <div class="home-scene home-scene--trail"></div>
    <div class="home-bg-overlay"></div>
    <div class="home-bg-glow"></div>
    <div class="home-ambient home-ambient--stars"></div>
    <div class="home-ambient home-ambient--embers"></div>
    <div class="home-ambient home-ambient--sparks"></div>
  </div>

  <div class="home-topbar">
    <a class="home-mini-brand" href="/">如珩</a>
    <div class="inline-actions">
      <button class="icon-button theme-button" type="button" data-theme-toggle></button>
    </div>
  </div>

  <main class="home-main">
    <section class="home-hero home-panel-section" aria-labelledby="homeHeroTitle" data-home-panel="hero">
      <div class="hero-center glass-section glass-section--hero home-hero-panel home-panel-frame">
        <h1 class="home-title" id="homeHeroTitle">
          <span class="home-title-line home-title-line--top" id="homeHeroTitleTop"></span>
          <span class="home-title-line home-title-line--bottom" id="homeHeroTitleBottom"></span>
        </h1>
      </div>
    </section>

    <section class="home-navigation home-panel-section" id="homeNavigation" data-home-panel="camp">
      <div class="home-panel-shell page-shell">
        <div class="home-panel-card glass-section glass-section--content home-panel-frame">
          <div class="home-panel-heading">
            <div class="navigation-head navigation-head--decorated">
              <h2 class="section-heading">营地</h2>
              <span class="section-emoji" aria-hidden="true">⛺</span>
            </div>
            <p class="section-caption">在篝火边整备行囊，选定下一处据点。</p>
          </div>
          <div class="navigation-grid home-panel-body" id="homeDestinations"></div>
        </div>
      </div>
    </section>

    <section class="home-stats home-panel-section" data-home-panel="trail">
      <div class="home-panel-shell page-shell">
        <div class="home-panel-card glass-section glass-section--content home-panel-frame">
          <div class="home-panel-heading">
            <div class="navigation-head navigation-head--decorated">
              <h2 class="section-heading">旅者足迹</h2>
              <span class="section-emoji" aria-hidden="true">🔥</span>
            </div>
            <p class="section-caption">火光照见来时的路，每一步都留下回声。</p>
          </div>
          <div class="stats-grid home-panel-body">
            <article class="stat-card">
              <div class="stat-label">运行时长</div>
              <div class="stat-value" id="runtimeCount">--</div>
            </article>
            <article class="stat-card">
              <div class="stat-label">访客数量</div>
              <div class="stat-value"><span id="busuanzi_value_site_uv" data-busuanzi-fallback>加载中</span></div>
            </article>
            <article class="stat-card">
              <div class="stat-label">文章数量</div>
              <div class="stat-value" id="articleCount">--</div>
            </article>
            <article class="stat-card">
              <div class="stat-label">标签数量</div>
              <div class="stat-value" id="categoryCount">--</div>
            </article>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer home-footer-spacer" id="homeFooterText" aria-hidden="true"></footer>
</body>
</html>
